name: Release RuriLib.Http

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release. Must match RuriLib.Http.csproj.
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Validate version
      shell: pwsh
      run: |
        [xml]$project = Get-Content RuriLib.Http/RuriLib.Http.csproj
        $actualVersion = $project.Project.PropertyGroup.Version | Select-Object -First 1
        if ($actualVersion -ne '${{ inputs.version }}') {
          throw "Requested version '${{ inputs.version }}' does not match project version '$actualVersion'."
        }

    - name: Fetch curl-impersonate native assets
      run: dotnet run --project Tools/CurlImpersonate.NativeAssets -- --rid all

    - name: Restore
      run: dotnet restore RuriLib.Http.Tests/RuriLib.Http.Tests.csproj

    - name: Build
      run: dotnet build RuriLib.Http.Tests/RuriLib.Http.Tests.csproj --configuration Release --no-restore

    - name: Test
      run: dotnet test RuriLib.Http.Tests/RuriLib.Http.Tests.csproj --configuration Release --no-build

    - name: Create NuGet package
      run: dotnet pack RuriLib.Http/RuriLib.Http.csproj --output nupkgs --configuration Release --no-build

    - name: Upload NuGet package
      run: dotnet nuget push "nupkgs/*.nupkg" -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate
